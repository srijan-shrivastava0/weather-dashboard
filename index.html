<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>🌤️ Weather Dashboard</h1>
                <button class="theme-toggle" id="themeToggle">🌙</button>
            </div>
        </header>

        <!-- Search Section -->
        <section class="search-section">
            <div class="search-container">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search city..." 
                    class="search-input"
                >
                <button id="searchBtn" class="search-btn">Search</button>
                <button id="geoBtn" class="geo-btn" title="Use current location">📍</button>
            </div>
            <div class="recent-searches" id="recentSearches"></div>
        </section>

        <!-- Current Weather -->
        <section class="current-weather" id="currentWeather">
            <div class="weather-loading">Loading weather data...</div>
        </section>

        <!-- Hourly Forecast -->
        <section class="forecast-section">
            <h2>Hourly Forecast</h2>
            <div class="hourly-forecast" id="hourlyForecast">
                <div class="loading">Loading...</div>
            </div>
        </section>

        <!-- 7-Day Forecast -->
        <section class="forecast-section">
            <h2>7-Day Forecast</h2>
            <div class="daily-forecast" id="dailyForecast">
                <div class="loading">Loading...</div>
            </div>
        </section>

        <!-- Favorites -->
        <section class="favorites-section">
            <h2>Favorite Cities</h2>
            <div class="favorites-list" id="favoritesList"></div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
